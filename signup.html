<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/assets/images/LostNLinkedLogo.jpg">
  <title>Sign-Up</title>

  <!-- style links -->
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>

<body>
  <!-- Top Logo -->
  <img src="/assets/images/LostNLinkedLogo.jpg" alt="Logo" class="logo-container">

  <!-- Sign-up Card -->
  <div class="card" id="signup-card">
    <center><h1>Create an Account</h1></center>
    <form id="signup-form">
      <!-- Email Input -->
      <label for="email" class="form-label">Email</label>
      <input type="email" id="email" class="form-input">
      <!-- Password Input -->
      <label for="password" class="form-label">Password</label>
      <input type="password" id="password" class="form-input">
      <!-- First Name Input -->
      <label for="firstname" class="form-label">First Name</label>
      <input type="text" id="firstname" class="form-input" required>
      <!-- Last Name Input -->
      <label for="lastname" class="form-label">Last Name</label>
      <input type="text" id="lastname" class="form-input" required>
      <!-- Role Input -->
      <label for="role" class="form-label">Role</label>
      <select id="role" class="form-input" required>
        <option value="" hidden></option>
        <option value="Student">Student</option>
        <option value="Faculty">Faculty</option>
      </select>
      
      <!-- Grade Input -->
      <label for="grade" class="form-label hidden" id="grade-label">Grade</label>
      <input type="text" id="grade" class="form-input hidden">
      <label for="department" class="form-label hidden" id="department-label">Department</label>
      <input type="text" id="department" class="form-input hidden">
      <!-- error label -->
      <label id="error-label" class="error hidden"></label>
      <button type="submit" class="btn">Create your Account</button>
      <p>Already have an account? <a href="login.html" class="link">Login</a></p>
      <div id="success-message" class="success hidden">
        Your account was created successfully!
        Please <a href="login.html" class="success-login-link">login</a> to access your dashboard.
      </div>
    </form>
  </div>

  <!-- Scripts -->
  <script type="module" src="/assets/js/signup.js"></script>
</body>

</html>
