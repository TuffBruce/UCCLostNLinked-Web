<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/assets/images/LostNLinkedLogo.jpg">
    <title>UploadFound Item</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-left">
            <a href="index.html" class="big-nav-item">LostNLinked</a>
            <a href="upload-founditem.html" class="nav-item">Upload Found Item</a>
            <a href="founditems.html" class="nav-item">Found Items</a>
            <a href="report-lostitem.html" class="nav-item">Report Lost Item</a>
            <a href="lostitems.html" class="nav-item">Lost Items</a>
            <a href="gratitude.html" class="nav-item">Gratitude Board</a>
        </div>
        <div id="navbar-user-info">
            <a href="settings.html" class = "nav-item">Settings</a>
            <span id="user-email"></span>
            <div class = "nav-item">
                <button id="logout-btn">Logout</button>
            </div>
        </div>
    </nav>
    <!-- Content of page -->
    <div class="content">
        <form id="upload-list-item-form" class="card">
            <h1>Upload Found Item</h1>
            <!-- Item title -->
            <label for="item-title" class="form-label">Item Title / Name</label>
            <input type="text" id="item-title" class="form-input" required>
            <!-- Item's Found Location-->
            <label for="foundLocation" class="form-label">Location Found</label>
            <input type="text" id="foundLocation" class="form-input" required>
            <!-- Item Category -->
            <label for="item-category" class="form-label">Item Category</label>
            <select id="item-category" class="form-input" required>
                <option value="" hidden></option>
                <option value="clothing">Clothing</option>
                <option value="shoes">Shoes</option>
                <option value="bottles">Bottles</option>
                <option value="stationary">Stationary</option>
                <option value="others">Others</option>
            </select>
            <!-- Date Found -->
            <label for="date-found" class="form-label">Date Found</label>
            <input type="date" id="date-found" class="form-input" required>
            <!-- Potential Lost Item Owner Name -->
            <label for="potential-owner-name" class="form-label">Potential Owner Name</label>
            <input type="text" id="potential-owner-name" class="form-input" placeholder="If you do not know the owner, leave it blank">
            <!-- Add Photo -->
            <label for="item-photo" class="form-label">Add Photo</label>
            <input type="file" id="item-photo" class="form-input" accept="image/*" required>

            <!-- Image Preview -->
            <img id="image-preview" class="hidden" style="max-width: 100%;">
            
            <button type="submit" id="submit-btn" class="btn">Upload Found Item</button>
        </form>
    </div>
    <!-- Scripts -->
    <script type="module" src="/assets/js/navbar.js"></script>
    <script type="module" src="/assets/js/upload-founditem.js"></script>
</body>
</html>
